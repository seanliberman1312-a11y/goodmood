<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2d6a4f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>GOODMOOD 🌿</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- מסך פתיחה -->
<div id="splash-screen">
  <div class="splash-logo">🌿</div>
  <h1>GOODMOOD</h1>
  <p>צא לטבע — אסוף פרחים, עצים ובעלי חיים נדירים</p>
  <button id="start-btn" onclick="startApp()">התחל הרפתקה 🚀</button>
</div>

<!-- מסך ראשי -->
<div id="main-app" class="hidden">

  <!-- תפריט עליון -->
  <div id="top-bar">
    <div id="player-info">
      <span id="player-name">🌿 חוקר טבע</span>
      <span id="player-level">רמה 1</span>
    </div>
    <div id="score-display">
      <span id="coin-count">🪙 0</span>
    </div>
  </div>

  <!-- תצוגות -->
  <div id="views">

    <!-- מפה -->
    <div id="map-view" class="view active">
      <div id="map-container"></div>
      <div id="radar-pulse"></div>
      <div id="nearby-creatures"></div>
    </div>

    <!-- מצלמה / AR -->
    <div id="camera-view" class="view hidden">
      <video id="camera-feed" autoplay playsinline></video>
      <div id="ar-overlay">
        <div id="ar-crosshair">🎯</div>
        <div id="ar-creature-display"></div>
        <button id="catch-btn" class="hidden" onclick="catchCreature()">אסוף! 🤚</button>
      </div>
      <div id="camera-hint">כוון את המצלמה לסביבה שלך</div>
    </div>

    <!-- אוסף -->
    <div id="collection-view" class="view hidden">
      <h2>האוסף שלי 🎒</h2>
      <div id="collection-tabs">
        <button class="tab-btn active" onclick="filterCollection('all')">הכל</button>
        <button class="tab-btn" onclick="filterCollection('flower')">🌸 פרחים</button>
        <button class="tab-btn" onclick="filterCollection('tree')">🌳 עצים</button>
        <button class="tab-btn" onclick="filterCollection('animal')">🦋 בעלי חיים</button>
      </div>
      <div id="collection-grid"></div>
      <div id="collection-empty" class="hidden">
        <p>האוסף ריק עדיין...<br/>צא החוצה ואסוף! 🚶</p>
      </div>
    </div>

    <!-- פרופיל -->
    <div id="profile-view" class="view hidden">
      <div id="profile-card">
        <div id="profile-avatar">🌿</div>
        <h2 id="profile-name">חוקר טבע</h2>
        <div id="profile-stats">
          <div class="stat-box">
            <span class="stat-num" id="stat-total">0</span>
            <span class="stat-label">נאספו</span>
          </div>
          <div class="stat-box">
            <span class="stat-num" id="stat-rare">0</span>
            <span class="stat-label">נדירים</span>
          </div>
          <div class="stat-box">
            <span class="stat-num" id="stat-level">1</span>
            <span class="stat-label">רמה</span>
          </div>
        </div>
        <div id="xp-bar-container">
          <div id="xp-bar"></div>
          <span id="xp-text">0 / 100 XP</span>
        </div>
        <div id="achievements">
          <h3>הישגים 🏆</h3>
          <div id="achievements-list"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- תפריט תחתון -->
  <nav id="bottom-nav">
    <button class="nav-btn active" onclick="showView('map')">
      <span class="nav-icon">🗺️</span>
      <span>מפה</span>
    </button>
    <button class="nav-btn camera-nav-btn" onclick="showView('camera')">
      <span class="nav-icon big">📷</span>
    </button>
    <button class="nav-btn" onclick="showView('collection')">
      <span class="nav-icon">🎒</span>
      <span>אוסף</span>
    </button>
    <button class="nav-btn" onclick="showView('profile')">
      <span class="nav-icon">👤</span>
      <span>פרופיל</span>
    </button>
  </nav>

</div>

<!-- פופאפ איסוף -->
<div id="catch-popup" class="popup hidden">
  <div class="popup-content">
    <div id="popup-creature-emoji"></div>
    <h2 id="popup-creature-name"></h2>
    <p id="popup-creature-rarity"></p>
    <p id="popup-creature-desc"></p>
    <div id="popup-xp">+<span id="popup-xp-val"></span> XP</div>
    <button onclick="closePopup()">מגניב! ✨</button>
  </div>
</div>

<!-- Leaflet מפה -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
