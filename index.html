<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a2a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>GOODMOOD 🌿</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<div id="splash">
  <div id="splash-bg"></div>
  <div id="splash-content">
    <div id="splash-logo">🌿</div>
    <h1>GOODMOOD</h1>
    <p>צא לטבע — גלה ואסוף יצורים נדירים</p>
    <button id="splash-btn" onclick="startApp()">התחל 🚀</button>
  </div>
</div>

<div id="app" class="hidden">

  <div id="map-screen" class="screen active">
    <div id="map"></div>

    <div id="hud-top">
      <div id="hud-avatar">🌿</div>
      <div id="hud-info">
        <div id="hud-name">חוקר טבע</div>
        <div id="hud-xp-bar"><div id="hud-xp-fill"></div></div>
      </div>
      <div id="hud-coins">🪙 <span id="coin-val">0</span></div>
    </div>

    <div id="dist-badge">🚶 <span id="dist-val">0מ</span></div>

    <div id="nearby-panel">
      <div id="nearby-title">קרוב אליך</div>
      <div id="nearby-list"></div>
    </div>

    <div id="bottom-bar">
      <button class="side-btn" onclick="showScreen('collection')">🎒</button>
      <button id="pokeball-btn" onclick="showScreen('map')">
        <div id="pokeball">
          <div id="pokeball-top"></div>
          <div id="pokeball-mid"></div>
          <div id="pokeball-bot"></div>
          <div id="pokeball-center"></div>
        </div>
      </button>
      <button class="side-btn" onclick="showScreen('profile')">👤</button>
    </div>
  </div>

  <div id="encounter-screen" class="screen hidden">
    <div id="encounter-bg"></div>
    <div id="encounter-header">
      <div id="enc-name-box">
        <div id="enc-name"></div>
        <div id="enc-rarity-stars"></div>
        <div id="enc-hp-bar"><div id="enc-hp-fill"></div></div>
      </div>
      <button id="enc-run" onclick="runAway()">ברח</button>
    </div>
    <div id="enc-creature-wrap">
      <div id="enc-shadow"></div>
      <div id="enc-creature"></div>
      <div id="enc-appear-text"></div>
    </div>
    <div id="enc-grass"></div>
    <div id="throw-area">
      <div id="throw-hint">החלק למעלה לזרוק 🟢</div>
      <div id="throw-ball" draggable="false">🟢</div>
      <div id="throw-rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
      </div>
    </div>
  </div>

  <div id="collection-screen" class="screen hidden">
    <div id="coll-header">
      <button onclick="showScreen('map')">← חזור</button>
      <h2>האוסף שלי 🎒</h2>
    </div>
    <div id="coll-tabs">
      <button class="ctab active" onclick="filterColl('all',this)">הכל</button>
      <button class="ctab" onclick="filterColl('flower',this)">🌸 פרחים</button>
      <button class="ctab" onclick="filterColl('tree',this)">🌳 עצים</button>
      <button class="ctab" onclick="filterColl('animal',this)">🦋 חיות</button>
    </div>
    <div id="coll-grid"></div>
    <div id="coll-empty" class="hidden">צא החוצה ואסוף! 🌿</div>
  </div>

  <div id="profile-screen" class="screen hidden">
    <div id="prof-header">
      <button onclick="showScreen('map')">← חזור</button>
      <h2>פרופיל 👤</h2>
    </div>
    <div id="prof-card">
      <div id="prof-avatar">🌿</div>
      <div id="prof-name">חוקר טבע</div>
      <div id="prof-level">רמה <span id="prof-lvl-num">1</span></div>
      <div id="prof-xp-wrap">
        <div id="prof-xp-bar"><div id="prof-xp-fill"></div></div>
        <div id="prof-xp-text">0 / 100 XP</div>
      </div>
      <div id="prof-stats">
        <div class="pstat"><div class="pstat-n" id="ps-total">0</div><div class="pstat-l">נאספו</div></div>
        <div class="pstat"><div class="pstat-n" id="ps-rare">0</div><div class="pstat-l">נדירים</div></div>
        <div class="pstat"><div class="pstat-n" id="ps-types">0</div><div class="pstat-l">סוגים</div></div>
      </div>
    </div>
    <div id="achievements-wrap">
      <h3>הישגים 🏆</h3>
      <div id="ach-list"></div>
    </div>
  </div>

  <div id="success-popup" class="hidden">
    <div id="success-card">
      <div id="suc-caught-text">נתפס!</div>
      <div id="suc-emoji"></div>
      <div id="suc-name"></div>
      <div id="suc-rarity"></div>
      <div id="suc-xp">+<span id="suc-xp-val"></span> XP</div>
      <button onclick="closeSuccess()">מגניב! ✨</button>
    </div>
  </div>

  <div id="flee-popup" class="hidden">
    <div id="flee-card">
      <div id="flee-emoji"></div>
      <div id="flee-text">ברח!</div>
      <button onclick="closeFlee()">המשך</button>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
